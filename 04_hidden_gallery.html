<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>桐羽 - 秘密影像库</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .video-box {
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--clow-gold);
            border-radius: 15px;
            padding: 10px;
            transition: transform 0.3s;
        }
        .video-box:hover { transform: scale(1.02); }
        video { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="sakura-container"></div>
    
    <div class="parallax-wrapper">
        <div id="layer-bg" style="background-image: url('./image/tongyubeijing.png'); filter: blur(8px) brightness(0.6);"></div>
        <div id="layer-fg" style="background-image: url('./image/tongyu2_fg.png');"></div>
    </div>

    <nav>
        <div class="clow-card-nav" onclick="window.location.href='works.html'"><span>返回</span></div>
    </nav>

    <main class="works-horizontal-main">
        <h2 class="works-title" style="margin-bottom: 30px;">秘密映像库</h2>
        <div class="video-grid">
            <div class="video-box">
                <video controls><source src="./MP4/tongyuMp4 1.mp4" type="video/mp4"></video>
            </div>
            <div class="video-box">
                <video controls><source src="./MP4/tongyuMp4 2.mp4" type="video/mp4"></video>
            </div>
            <div class="video-box">
                <video controls><source src="./MP4/tongyuMp4 3.mp4" type="video/mp4"></video>
            </div>
        </div>
    </main>

    <script src="./js/script.js"></script>
    <!-- 统一的 BGM 播放器，放置在所有页面的底部 -->
<div class="bgm-control" id="bgm-toggle">
    <div class="bgm-icon">♪</div>
</div>
<audio id="bgm-audio" loop>
    <source src="./mp3/music.mp3.mpeg" type="audio/mpeg">
</audio>
</body>
</html>
