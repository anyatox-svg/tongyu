    <script src="./js/script.js"></script>
    <script>
        document.addEventListener('click', function(e) {
            // 只要点击的不是作品卡片且不是导航栏，就视为背景空白
            const isClickingCard = e.target.closest('.work-item');
            const isClickingNav = e.target.closest('nav');
            
            if (!isClickingCard && !isClickingNav) {
                // 跳转到隐藏的专属页面
                window.location.href = 'hidden_gallery.html';
            }
        });
    </script>
    <!-- 统一的 BGM 播放器，放置在所有页面的底部 -->
<div class="bgm-control" id="bgm-toggle">
    <div class="bgm-icon">♪</div>
</div>
<audio id="bgm-audio" loop>
