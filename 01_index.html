<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桐羽 - 魔卡少女樱设定集</title>
    <!-- CSS 样式路径 -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- 引入艺术字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 樱花飘落容器 -->
    <div id="sakura-container"></div>

    <!-- 视差背景层 -->
    <div class="parallax-wrapper">
        <div id="layer-bg" style="background-image: url('./image/tongyu2.jpg"></div>
        <div id="layer-fg" style="background-image: url('./image/tongyu2_fg.png');"></div>
    </div>

    <!-- 导航栏 -->
    <nav>
        <!-- 修改导航栏部分 -->
<nav>
    <nav>
    <div class="clow-card-nav" onclick="window.location.href='index.html'"><span>主页</span></div>
    <div class="clow-card-nav" onclick="window.location.href='works.html'"><span>作品</span></div>
    <div class="clow-card-nav" onclick="window.location.href='contact.html'"><span>联系方式</span></div>
</nav>
    
</nav>
    </nav>

    <main>
        <h1 class="magic-title">欢迎来到桐羽の魔法世界</h1>
        
        <div class="gallery">
            <!-- 翻转卡牌：添加了 data-link 属性以便 JS 调用 -->
            <div class="flip-card" data-link="detail.html" style="cursor: pointer;">
                <div class="flip-card-inner">
                    <!-- 正面 -->
                    <div class="flip-card-front" style="background-image: url('./image/tongyu2.jpg');"></div>
                    <!-- 背面 -->
                    <div class="flip-card-back">
                        <h3>木之本樱 · 纯白花嫁</h3>
                        <div class="card-info">
                            <p><strong>时间：</strong> 2024年春</p>
                            <p><strong>地点：</strong> 友枝町海滩</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- JS 逻辑 -->
    <script src="./js/script.js"></script>
    <script>
        // 点击卡牌后延迟 600ms 跳转，确保翻转动画播完
        document.querySelector('.flip-card').addEventListener('click', function() {
            const target = this.getAttribute('data-link');
            setTimeout(function() {
                window.location.href = target;
            }, 600);
        });
    </script>
    <!-- BGM 控制按钮 -->
<div class="bgm-control" id="bgm-toggle">
    <div class="bgm-icon">♪</div>
    <audio id="bgm-audio" loop>
        <!-- 请确保你的 MP3 文件路径正确 -->
        <source src="./mp3/music.mp3.mpeg" type="audio/mpeg">
    </audio>
</div>
</body>
</html>
